name: Loom issue runner

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  id-token: write

jobs:
  launch:
    if: github.event.label.name == 'loom' && vars.LOOM_URL != ''
    runs-on: ubuntu-latest
    env:
      LOOM_URL: ${{ vars.LOOM_URL }}
      LOOM_PROFILE: ${{ vars.LOOM_PROFILE }}
    steps:
      - name: Exchange GitHub identity and create run
        env:
          REPOSITORY: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          case "$LOOM_URL" in
            */) echo 'LOOM_URL must not have a trailing slash' >&2; exit 2 ;;
          esac
          profile="${LOOM_PROFILE:-github-actions}"
          audience=$(jq -rn --arg value "$LOOM_URL" '$value|@uri')
          oidc_json=$(curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$audience")
          oidc_token=$(jq -r .value <<<"$oidc_json")
          loom_token=$(curl --fail-with-body --silent --show-error \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg token "$oidc_token" '{token:$token}')" \
            "$LOOM_URL/api/auth/federate" | jq -r .token)
          request=$(jq -n \
            --arg profile "$profile" \
            --arg repo "$REPOSITORY" \
            --arg title "$ISSUE_TITLE" \
            --argjson issue "$ISSUE_NUMBER" \
            '{profile:$profile,idempotency_key:"",source:"actions",session:{repo:$repo,title:$title,issue:$issue}}')
          curl --fail-with-body --silent --show-error \
            -H "Authorization: Bearer $loom_token" \
            -H 'Content-Type: application/json' \
            -d "$request" \
            "$LOOM_URL/api/runs" | jq .
