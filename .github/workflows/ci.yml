name: CI

# Gates merges into main. The `build` job compiles the whole workspace with the
# `embed-frontend` feature, so build.rs runs `npm install` + rspack and a broken
# frontend dependency tree — e.g. an rspack peer-dependency conflict from a
# Dependabot bump — fails CI here instead of on a contributor's machine. The
# `lint`/`test` jobs build backend-only (the default), so they need no Node.

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same branch cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/loom/frontend/package-lock.json
      # Full build: `embed-frontend` makes build.rs run the frontend toolchain
      # (npm + rspack). This is the check that catches frontend dependency
      # breakage.
      - run: cargo build --workspace --features loom/embed-frontend --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Integration tests shell out to real `git` and `tmux` (see AGENTS.md).
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: cargo test --workspace --locked
